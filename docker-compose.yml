version: '3.8'

services:
  openai-to-gemini:
    image: ghcr.io/gzzhongqi/vertex2openai:latest
    container_name: vertex2openai
    ports:
      - "8050:7860"
    environment:
      # Protect this adapter's OpenAI-compatible API.
      - API_KEY=123456
      # Required: one or more Gemini Express Mode API keys, separated by commas.
      - VERTEX_EXPRESS_API_KEY=your_vertex_express_api_key
      # Optional: set true to rotate Express keys in order instead of random selection.
      - ROUNDROBIN=false
      # Optional: fake streaming keeps client connections alive while waiting for non-streaming Gemini responses.
      - FAKE_STREAMING=false
      - FAKE_STREAMING_INTERVAL=1.0
      # Optional: self keep-alive for idle-sleep platforms like Render.
      # Set this to your deployed URL, for example: https://your-app.onrender.com/keepalive
      - KEEPALIVE_URL=
      - KEEPALIVE_INTERVAL=60
    restart: unless-stopped
